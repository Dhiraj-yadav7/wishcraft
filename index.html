<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WishCraft — Redirecting...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Load auth protection logic to handle root routing instantly -->
    <script src="src/js/auth.js"></script>
</head>
<body style="margin: 0; padding: 0; background: #0b0813; font-family: 'Outfit', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; color: #ffffff;">
    <div style="text-align: center; z-index: 100;">
        <div style="font-size: 3.5rem; animation: floatUp 1.2s infinite alternate; margin-bottom: 1.2rem; user-select: none;">🪄✨</div>
        <h1 style="font-size: 1.8rem; font-weight: 800; margin: 0 0 0.5rem; letter-spacing: 0.05em; background: linear-gradient(135deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; user-select: none;">WishCraft</h1>
        <p style="font-size: 0.95rem; color: #94a3b8; display: flex; align-items: center; justify-content: center; gap: 0.6rem; margin: 0; user-select: none;">
            <span style="display: inline-block; width: 14px; height: 14px; border: 2px solid #a855f7; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></span>
            Entering magical space...
        </p>
    </div>
    
    <style>
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes floatUp { from { transform: translateY(0); } to { transform: translateY(-8px); } }
    </style>
</body>
</html>
