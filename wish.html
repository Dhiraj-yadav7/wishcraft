<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Birthday Surprise For You! 🎁</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body class="wish-body theme-romantic"> <!-- Loaded dynamic theme gets applied here -->

    <!-- Fireworks background canvas -->
    <canvas id="fireworks-canvas"></canvas>

    <!-- Main Container -->
    <div class="surprise-reveal-wrapper">
        
        <!-- The Sealed Envelope (Initial State) -->
        <div id="envelope" class="envelope">
            <div class="envelope-flap"></div>
            <div class="envelope-pocket"></div>
            <div class="envelope-seal">💌</div>
            <div class="envelope-invitation-text">TAP TO OPEN SURPRISE</div>
        </div>

        <!-- The Birthday Card (Slides up when Envelope is opened) -->
        <div id="displayCard" class="display-card">
            
            <div class="display-photo-frame">
                <img id="recipientPhoto" src="" alt="Birthday Portrait" class="display-photo">
            </div>

            <span id="relationBadge" class="relationship-badge">Friend</span>
            
            <h1 id="cardTitle" class="birthday-title">Happy Birthday! 🎉</h1>
            
            <div id="wishMessage" class="wish-message"></div>

            <div id="countdownBox" class="countdown-box"></div>

            <!-- Interactivity Controls -->
            <div class="card-controls">
                <!-- Replay / Pause Music -->
                <button type="button" id="musicBtn" class="control-btn" title="Toggle Music">🎵</button>
                <!-- Retrigger Fireworks -->
                <button type="button" id="fireworksBtn" class="control-btn" title="Launch Fireworks">🎆</button>
                <!-- Create another card -->
                <button type="button" id="createBtn" class="control-btn" title="Create a Card">✍️</button>
            </div>
            
        </div>

    </div>

    <!-- Web Audio & Canvas JavaScript -->
    <script src="src/js/wish.js"></script>
</body>
</html>
